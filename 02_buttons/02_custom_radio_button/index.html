<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Radio Button</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/2d559d81b0.js" crossorigin="anonymous" defer></script>
</head>

<body>
    <fieldset class="options-group">
        <legend class="offscreen">User Type</legend>

        <label class="option option-1">
            <input type="radio" name="userType" value="student" checked>
            <i class="fa-regular fa-circle"></i>
            Student
        </label>

        <label class="option option-2">
            <input type="radio" name="userType" value="teacher">
            <i class="fa-regular fa-circle"></i>
            Teacher
        </label>
    </fieldset>
</body>

</html>
