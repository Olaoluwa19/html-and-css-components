<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Card on Hover</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/2d559d81b0.js" crossorigin="anonymous"></script>
</head>

<body>
    <section class="wrapper">
        <figure class="card front-face">
            <img src="img/me_in_dark_suit_navy_blue_tie.jpg" width="960" height="1075"
                alt="Wed Dev - Oladapo Oluwadurotimi" loading="lazy" />
        </figure>
        <figure class="card back-face">
            <img src="img/me_in_dark_suit_navy_blue_tie.jpg" width="960" height="1075"
                alt="Wed Dev - Oladapo Oluwadurotimi" loading="lazy" />
            <div class="info">
                <h2 class="title">Oladapo Oluwadurotimi</h2>
                <p>Fullstack Software Engineer</p>
            </div>
            <ul>
                <li>
                    <a href="#">
                        <i class="fa-brands fa-square-github"></i>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fa-brands fa-square-facebook"></i>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fa-brands fa-square-youtube"></i>
                    </a>
                </li>
            </ul>
        </figure>
    </section>
</body>

</html>
