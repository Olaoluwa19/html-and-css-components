<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation sliding indicator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/2d559d81b0.js" crossorigin="anonymous" defer></script>
</head>
<!-- Designed by olaoluwa_codes -->

<body>
    <nav class="nav">
        <input type="radio" name="slider" class="home" id="home" checked>
        <input type="radio" name="slider" class="blog" id="blog">
        <input type="radio" name="slider" class="code" id="code">
        <input type="radio" name="slider" class="help" id="help">
        <input type="radio" name="slider" class="about" id="about">
        <div class="nav-container">
            <div class="slider"></div>
            <label for="home" class="icon home">
                <i class="fa-solid fa-house"></i>&nbsp;Home
            </label>
            <label for="blog" class="icon blog">
                <i class="fa-solid fa-blog"></i>&nbsp;Blog
            </label>
            <label for="code" class="icon code">
                <i class="fa-solid fa-code"></i>&nbsp;Code
            </label>
            <label for="help" class="icon help">
                <i class="fa-solid fa-envelope"></i>&nbsp;Help
            </label>
            <label for="about" class="icon about">
                <i class="fa-solid fa-user"></i>&nbsp;About
            </label>
        </div>
    </nav>
</body>

</html>
