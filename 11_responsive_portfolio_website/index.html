<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Portfolio website</title>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script type="module" src="assets/js/main.js"></script>
</head>

<body>
    <!-- -------- HEADER ---------- -->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="#" class="nav__logo">Olaoluwa</a>

            <aside class="nav__menu" id="nav-menu">
                <ul class="nav__list grid">
                    <li class="nav__item">
                        <a href="#home" class="nav__link"><i class="uil uil-estate nav__icon"></i>Home</a>
                    </li>
                    <li class="nav__item">
                        <a href="#about" class="nav__link"><i class="uil uil-user nav__icon"></i>About</a>
                    </li>
                    <li class="nav__item">
                        <a href="#skills" class="nav__link"><i class="uil uil-file-alt nav__icon"></i>Skills</a>
                    </li>
                    <li class="nav__item">
                        <a href="#services" class="nav__link"><i
                                class="uil uil-briefcase-alt nav__icon"></i>Services</a>
                    </li>
                    <li class="nav__item">
                        <a href="#portfolio" class="nav__link"><i class="uil uil-scenery nav__icon"></i>Portfolio</a>
                    </li>
                    <li class="nav__item">
                        <a href="#contact" class="nav__link"><i class="uil uil-message nav__icon"></i>Contact Me</a>
                    </li>
                </ul>
                <i class="uil uil-times nav__close" id="nav-close"></i>
            </aside>

            <div class="nav__btns">
                <button type="button" class="nav__toggle" id="nav-toggle" aria-label="Toggle navigation">
                    <i class="uil uil-apps nav__icon"></i>
                </button>
            </div>
        </nav>
    </header>

    <main class="main">
        <section class="home section" id="home">
            <div class="home__container container grid">
                <div class="home__content grid">
                    <div class="home__social">
                        <a href="#" class="home__social-icon">
                            <i class="uil uil-linkedin-alt"></i>
                        </a>
                        <a href="#" class="home__social-icon">
                            <i class="uil uil-github-alt"></i>
                        </a>
                        <a href="#" class="home__social-icon">
                            <i class="uil uil-youtube"></i>
                        </a>
                    </div>

                    <figure class="home__img">
                        <svg class="home_blob" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <clipPath id="a">
                                    <path fill="currentColor"
                                        d="M765.5 644.5Q667 789 460 858.5T209 714q-44-214 24-386.5t255.5-153Q676 194 770 347t-4.5 297.5Z" />
                                </clipPath>
                            </defs>
                            <g clip-path="url(#a)">
                                <path fill="#444CF7"
                                    d="M765.5 644.5Q667 789 460 858.5T209 714q-44-214 24-386.5t255.5-153Q676 194 770 347t-4.5 297.5Z" />
                                <image class="home__blog-img" x="150" y="180" width="600" height="700"
                                    xlink:href="assets/img/profile_pix_1_447x559.png"
                                    preserveAspectRatio="xMidYMid meet" />
                            </g>
                        </svg>

                    </figure>

                    <article class="home__data">
                        <h2 class="home__title">Hi, I'm Olaoluwa</h2>
                        <p class="home__subtitle">Fullstack Developer</p>
                        <p class="home__description">High Level experience in crafting High-end web Application</p>
                        <a href="#contact" class="button button--flex">
                            Contact me<i class="uil uil-message button__icon"></i>
                        </a>
                    </article>
                </div>
                <figure class="home__scroll">
                    <a href="#about" class="home__scroll-button button--flex">
                        <i class="uil uil-mouse-alt home__scroll-mouse"></i>
                        <span class="home__scroll-name">Scroll down</span>
                        <i class="uil uil-arrow-down home__scroll-arrow"></i>
                    </a>
                </figure>
            </div>
        </section>


    </main>

</body>

</html>
