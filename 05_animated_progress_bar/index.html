<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Progress Bar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/2d559d81b0.js" crossorigin="anonymous" defer></script>
</head>

<body>
    <main class="container">
        <section class="skill-box">
            <h2 class="title">HTML</h2>
            <div class="skill-bar">
                <p class="skill-per html">
                    <span class="tooltip">99%</span>
                </p>
            </div>
        </section>

        <section class="skill-box">
            <h2 class="title">CSS</h2>
            <div class="skill-bar">
                <p class="skill-per css">
                    <span class="tooltip">50%</span>
                </p>
            </div>
        </section>

        <section class="skill-box">
            <h2 class="title">JavaScript</h2>
            <div class="skill-bar">
                <p class="skill-per javascript">
                    <span class="tooltip">80%</span>
                </p>
            </div>
        </section>

        <section class="skill-box">
            <h2 class="title">Node JS</h2>
            <div class="skill-bar">
                <p class="skill-per nodejs">
                    <span class="tooltip">95%</span>
                </p>
            </div>
        </section>
    </main>
</body>

</html>
