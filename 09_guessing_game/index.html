<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" module></script>
</head>

<body>
    <main class="wrapper">
        <h1>Guess a number from 1 to 100 to win a million Naira</h1>
        <p>Your number is high</p>
        <form>
            <input type="number">
            <button>Check</button>
        </form>
        <p>You have <span class="chances">10</span> chances</p>
    </main>
</body>

</html>
