<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/2d559d81b0.js" crossorigin="anonymous" defer></script>
</head>
<!-- Designed by olaoluwa_codes -->

<body>
    <main class="container">
        <form>
            <h2 class="title">Login</h2>
            <div class="input-box">
                <!-- <label for="email"><i class="fa-solid fa-user"></i></label> -->
                <input type="text" name="Email" id="Email" required placeholder="Email">
                <div class="underline"></div>
            </div>
            <div class="input-box">
                <!-- <label for="password"><i class="fa-solid fa-lock"></i></label> -->
                <input type="password" name="Password" id="Password" required placeholder="Password">
                <div class="underline"></div>
            </div>
            <div class="input-box">
                <button type="submit" class="btn">Login</button>
            </div>
        </form>
        <p class="option">or Connect with Social Media</p>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
    </main>
</body>

</html>
